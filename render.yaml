services:
  - type: web
    name: powergrid-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: DATABASE_URL
        sync: false # Set this manually in the dashboard for security
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: Test_Key_ID
        sync: false
      - key: Test_Key_Secret
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
